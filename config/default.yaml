# SoccerPredict default configuration.
# Override locally by copying to `config/local.yaml` (gitignored if desired)
# or by setting environment variables in `.env`.

random_seed: 42
log_level: INFO

# Where soccerdata caches scraped HTML/JSON. Leave null to use the
# library default (user home). Override via the SOCCERDATA_DIR env var.
soccerdata_dir: null

# Competitions of interest. The first entry is treated as the default.
# Season tags follow soccerdata conventions:
#   - World Cup uses 4-digit year, e.g. "2022".
#   - Domestic leagues typically use "23-24".
competitions:
  - name: FIFA World Cup
    source: FBref
    seasons:
      - "2022"
      - "2018"
      - "2014"
  - name: ENG-Premier League
    source: FBref
    seasons:
      - "23-24"
      - "22-23"

# Modeling defaults — consumed by `soccerpredict.models.train`.
model:
  baseline:
    test_size: 0.2
    max_iter: 1000
